services:


  redis:
    image: redis:alpine
    container_name: ntopng_redis
    restart: unless-stopped
    command: redis-server --save 900 1 --loglevel warning
    volumes:
      - ./data/redis:/data

  ntopng:
    image: ntop/ntopng:latest
    container_name: ntopng
    restart: unless-stopped
    command: ntopng --community -i any -l 1
    volumes:
      - ./data/ntopng:/var/lib/ntopng
    ports:
      - 3001:3000
    depends_on:
      - redis

  api:
    build: ../api
    container_name: rosyst_api
    restart: unless-stopped
    ports:
      - 8000:8000
    env_file:
      - ../api/.env
    depends_on:
      - ntopng
    extra_hosts:
      - "host.docker.internal:host-gateway"
